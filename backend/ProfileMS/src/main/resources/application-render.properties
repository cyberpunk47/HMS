# Render Cloud Profile
server.port=${PORT:9100}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
eureka.instance.non-secure-port=${PORT:9100}

# Error messages
DOCTOR_NOT_FOUND=Doctor not found
DOCTOR_ALREADY_EXISTS=Doctor already exists
PATIENT_NOT_FOUND=Patient not found
PATIENT_ALREADY_EXISTS=Patient already exists
